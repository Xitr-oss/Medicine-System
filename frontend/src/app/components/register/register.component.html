<div class="auth-container">
  <div class="auth-image-side">
    <div class="branding">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-heart-pulse"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></svg>
      </div>
      <h1>Join MediQuick Today.</h1>
      <p>Get access to fast delivery, reliable medications, and a seamless health shopping experience.</p>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-card" style="max-width: 500px;">
      <h2>Create an Account</h2>
      <p>Register below to start ordering medicines easily.</p>
      
      <div *ngIf="error" class="badge badge-danger" style="display:block; margin-bottom: 1.5rem; text-align:center; padding: 0.75rem;">
        {{ error }}
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" formControlName="name" placeholder="John Doe" />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" formControlName="email" placeholder="john@example.com" />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number (Will be used as Password)</label>
          <input type="text" id="phone" formControlName="phone" placeholder="1234567890" />
        </div>

        <div class="form-group">
          <label for="address">Delivery Address</label>
          <input type="text" id="address" formControlName="address" placeholder="123 Health Ave, City" />
        </div>

        <button type="submit" class="btn-primary" [disabled]="registerForm.invalid || loading">
          {{ loading ? 'Creating Account...' : 'Sign Up' }}
        </button>
      </form>

      <div class="auth-links">
        Already have an account? <a routerLink="/login">Log in here</a>
      </div>
    </div>
  </div>
</div>
