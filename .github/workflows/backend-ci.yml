name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore backend.csproj

      - name: Build API
        run: dotnet build backend.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test backend.csproj --configuration Release --no-build --verbosity normal

      - name: Publish API
        run: dotnet publish backend.csproj --configuration Release --no-build --output ./publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: backend/publish
          if-no-files-found: error
